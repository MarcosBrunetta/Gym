<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tracker" />
  <meta name="theme-color" content="#0A0A0F" />
  <title>Progress Tracker</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; }
    body { background: #0A0A0F; color: #E8E8F0; font-family: 'DM Mono', 'Courier New', monospace; overscroll-behavior: none; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: #0A0A0F; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    button:focus-visible, input:focus-visible { outline: 2px solid #6B8EFF; outline-offset: 2px; }
    @keyframes slideUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastIn { from { opacity:0; transform:translateX(110%); } to { opacity:1; transform:translateX(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .slide-up { animation: slideUp 0.3s ease both; }
    .toast-anim { animation: toastIn 0.3s ease; }
    .fade-in { animation: fadeIn 0.25s ease; }
    @media (prefers-reduced-motion: reduce) {
      .slide-up, .toast-anim, .fade-in { animation: none; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const C = {
  bg: "#0A0A0F", card: "#111", border: "#1a1a1a",
  text: "#E8E8F0", muted: "#555", dim: "#333",
};

// ─── RUTINA ACTUALIZADA SEGÚN PDF ────────────────────────────────────
// optional: true → ejercicio opcional, no cuenta para el progreso de sesión obligatorio
// noOverload: true → no aplica la sobrecarga progresiva automática (+kg/+disco/+máq).
//   Se usa en elevaciones laterales, donde el salto automático es demasiado agresivo
//   para una mancuerna/polea de aislamiento de hombro; el peso ahí se ajusta a mano.
const ROUTINE = {
  "Upper A": {
    day: "Lunes", color: "#FF6B35",
    exercises: [
      { id:"ua1", name:"Elevaciones laterales sentado banco 90°",            sets:4, reps:"15-20", iw:8,    unit:"kg/manc",  type:"aisl", noOverload:true },
      { id:"ua2", name:"Press inclinado mancuernas banco 30°",               sets:3, reps:"10-12", iw:27.5, unit:"kg/manc",  type:"comp" },
      { id:"ua3", name:"Jalón al pecho agarre falso prono amplio",           sets:3, reps:"10-12", iw:15,   unit:"discos",   type:"comp" },
      { id:"ua4", name:"Fondos inclinados lastrados",                       sets:3, reps:"10-12", iw:15,   unit:"kg disco", type:"comp" },
      { id:"ua5", name:"Remo barra T agarre prono",                         sets:3, reps:"10-12", iw:62.5, unit:"kg total", type:"comp" },
      { id:"ua6", name:"Press militar mancuernas banco 80°",                 sets:3, reps:"10-12", iw:25,   unit:"kg/manc",  type:"comp" },
      { id:"ua7", name:"Pájaros mancuernas banco 45° agarre neutro",        sets:3, reps:"15-20", iw:8,    unit:"kg/manc",  type:"aisl" },
      { id:"ua8", name:"Crunch cuerda polea alta",                          sets:3, reps:"15-20", iw:16,   unit:"discos",   type:"aisl", optional:true },
    ]
  },
  "Lower A": {
    day: "Miércoles", color: "#4ECDC4",
    exercises: [
      { id:"la1", name:"Elevación de gemelos parado barra recta",            sets:4, reps:"15-20", iw:152.5, unit:"kg total", type:"aisl" },
      { id:"la2", name:"Sentadilla búlgara mancuernas",                            sets:3, reps:"10-12", iw:142.5, unit:"kg total", type:"comp" },
      { id:"la3", name:"Curl femoral sentado máquina",                            sets:3, reps:"10-12", iw:100,   unit:"kg total", type:"comp" },
      { id:"la4", name:"Extensión cuádriceps máquina",                      sets:3, reps:"10-12", iw:10,    unit:"discos",   type:"aisl" },
      { id:"la5", name:"Hiperextensión disco banco 45°",                      sets:3, reps:"10-12", iw:14,    unit:"discos",   type:"aisl" },
      { id:"la6", name:"Curl araña mancuernas banco 45°",                   sets:3, reps:"10-12", iw:17.5,  unit:"kg/manc",  type:"aisl" },
      { id:"la7", name:"Extensión overhead barra prono banco 60° polea baja",sets:3, reps:"10-12", iw:12,   unit:"discos",   type:"aisl" },
      { id:"la8", name:"Abducción máquina",                                 sets:3, reps:"10-12", iw:10,    unit:"discos",   type:"aisl", optional:true },
    ]
  },
  "Upper B": {
    day: "Viernes", color: "#A855F7",
    exercises: [
      { id:"ub1", name:"Elevaciones laterales polea baja banco 90°", sets:4, reps:"15-20", iw:2,  unit:"discos",   type:"aisl", noOverload:true },
      { id:"ub2", name:"Press plano mancuernas 0°",                          sets:3, reps:"10-12", iw:27.5, unit:"kg/manc",  type:"comp" },
      { id:"ub3", name:"Pullover barra recta banco inclinado 45° polea alta", sets:3, reps:"10-12", iw:15,  unit:"discos",   type:"comp" },
      { id:"ub4", name:"Press militar máquina",                              sets:3, reps:"10-12", iw:65,  unit:"kg máq",   type:"comp" },
      { id:"ub5", name:"Remo polea baja agarre V neutro amplio",             sets:3, reps:"10-12", iw:16,  unit:"discos",   type:"comp" },
      { id:"ub6", name:"Aperturas inclinadas mancuernas banco 30°", sets:3, reps:"10-12", iw:6, unit:"discos/c", type:"aisl" },
      { id:"ub7", name:"Face pull cuerda agarre neutro polea alta",          sets:3, reps:"15-20", iw:12,  unit:"discos",   type:"aisl" },
      { id:"ub8", name:"Crunch cuerda polea alta",                          sets:3, reps:"15-20", iw:16,  unit:"discos",   type:"aisl", optional:true },
    ]
  },
  "Lower B": {
    day: "Sábado", color: "#F59E0B",
    exercises: [
      { id:"lb1", name:"Elevación de gemelos sentado barra recta",           sets:4, reps:"15-20", iw:152.5, unit:"kg total", type:"aisl" },
      { id:"lb2", name:"Subidas al cajón mancuernas",                     sets:3, reps:"10-12", iw:100,   unit:"kg total", type:"comp" },
      { id:"lb3", name:"Curl femoral sentado máquina",                      sets:3, reps:"10-12", iw:25,    unit:"kg/manc",  type:"comp" },
      { id:"lb4", name:"Extensión cuádriceps máquina",                       sets:3, reps:"10-12", iw:12,    unit:"discos",   type:"aisl" },
      { id:"lb5", name:"Hiperextensión disco banco 45°",                       sets:3, reps:"10-12", iw:10,    unit:"discos",   type:"aisl" },
      { id:"lb6", name:"Curl inclinado mancuernas banco 45°",                sets:3, reps:"10-12", iw:20,    unit:"kg/manc",  type:"aisl" },
      { id:"lb7", name:"Extensión pushdown barra recta 45° polea alta",      sets:3, reps:"10-12", iw:12,    unit:"discos",   type:"aisl" },
      { id:"lb8", name:"Aducción máquina",                                   sets:3, reps:"10-12", iw:10,    unit:"discos",   type:"aisl", optional:true },
    ]
  }
};

const DAYS = ["Upper A","Lower A","Upper B","Lower B"];

// ─── INCREMENTO DE SOBRECARGA PROGRESIVA POR UNIDAD ───────────────────
// Cada unidad de carga sube de a un escalón distinto: kg reales suben de
// a 2,5 kg; "discos" (pin de polea/máquina selectorizada) sube de a 1;
// máquinas con lectura en kg suben de a 5 (escalones más grandes típicos).
const UNIT_INCREMENTS = {
  "kg/manc": 2.5,
  "kg total": 2.5,
  "kg disco": 2.5,
  "kg máq": 5,
  "discos": 1,
  "discos/c": 1,
};

function incFor(ex) {
  if (ex.noOverload) return 0;
  return UNIT_INCREMENTS[ex.unit] ?? 2.5;
}

function setsCountFor(ex, deload) {
  return deload ? Math.max(2, ex.sets - 1) : ex.sets;
}

function ls(k, def) { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; } catch { return def; } }
function lss(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); return true; } catch { return false; } }

function topRep(reps) { const parts = String(reps).split("-"); return parseInt(parts[parts.length-1], 10) || 0; }

function initWeights() {
  const w = {};
  Object.values(ROUTINE).forEach(r => r.exercises.forEach(e => { w[e.id] = e.iw; }));
  return w;
}

// ─── VERSIÓN DE RUTINA ────────────────────────────────────────────────
// Subí este string cada vez que cambies ejercicios, orden o ids en ROUTINE.
// Si no coincide con la guardada, se descartan los pesos viejos del
// localStorage: esto es lo que evita que un peso quede "pegado" a un
// ejercicio que ahora es otro distinto después de editar la rutina.
const ROUTINE_VERSION = "2026-06-26";

function loadWeights() {
  const storedVersion = ls("ft_routine_version", null);
  if (storedVersion !== ROUTINE_VERSION) return initWeights();
  return ls("ft_weights", null) || initWeights();
}

// ─── SET LOG MODAL ────────────────────────────────────────────────────
function LogModal({ ex, setIdx, color, currentWeight, onConfirm, onClose }) {
  const [weight, setWeight] = useState(String(currentWeight));
  const [reps, setReps] = useState("");
  const repsRef = useRef(null);
  useEffect(() => { setTimeout(() => repsRef.current?.focus(), 100); }, []);

  const repsNum = parseInt(reps, 10);
  const repsValid = Number.isInteger(repsNum) && repsNum > 0;

  const confirm = () => { if (!repsValid) return; onConfirm(parseFloat(weight)||0, repsNum); };

  return React.createElement("div", {
    className:"fade-in",
    onClick: onClose,
    role: "dialog",
    "aria-modal": true,
    "aria-label": `Registrar serie ${setIdx+1} de ${ex.name}`,
    style:{ position:"fixed", inset:0, zIndex:200, background:"rgba(0,0,0,0.88)", display:"flex", alignItems:"flex-end", justifyContent:"center" }
  },
    React.createElement("div", {
      onClick: e => e.stopPropagation(),
      className:"slide-up",
      style:{ background:"#141414", borderRadius:"20px 20px 0 0", padding:"24px 20px 40px",
        width:"100%", maxWidth:"480px", borderTop:`3px solid ${color}` }
    },
      React.createElement("p", { style:{ fontSize:10, color:C.muted, letterSpacing:"0.25em", marginBottom:4 } },
        `SERIE ${setIdx+1} · ${ex.type === "comp" ? "COMPUESTO" : "AISLADO"}`),
      React.createElement("p", { style:{ fontSize:13, color:"#ddd", marginBottom:22, lineHeight:1.4 } }, ex.name),
      React.createElement("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 } },
        React.createElement("div", null,
          React.createElement("label", { style:{ fontSize:9, color:C.muted, letterSpacing:"0.2em", display:"block", marginBottom:6 } }, `PESO (${ex.unit})`),
          React.createElement("input", {
            type:"number", value:weight, inputMode:"decimal",
            onChange: e => setWeight(e.target.value),
            "aria-label": `Peso en ${ex.unit}`,
            style:{ width:"100%", padding:"12px 8px", borderRadius:8, fontSize:22,
              fontFamily:"'Bebas Neue',sans-serif", background:"#1c1c1c",
              border:`1.5px solid ${color}55`, color:color, textAlign:"center", outline:"none" }
          })
        ),
        React.createElement("div", null,
          React.createElement("label", { style:{ fontSize:9, color:C.muted, letterSpacing:"0.2em", display:"block", marginBottom:6 } }, `REPS (${ex.reps})`),
          React.createElement("input", {
            ref: repsRef, type:"number", value:reps, inputMode:"numeric",
            onChange: e => setReps(e.target.value),
            onKeyDown: e => e.key==="Enter" && confirm(),
            "aria-label": `Repeticiones realizadas, rango objetivo ${ex.reps}`,
            style:{ width:"100%", padding:"12px 8px", borderRadius:8, fontSize:22,
              fontFamily:"'Bebas Neue',sans-serif", background:"#1c1c1c",
              border: reps && !repsValid ? "1.5px solid #f59e0b" : "1.5px solid #2a2a2a", color:"#fff", textAlign:"center", outline:"none" }
          })
        )
      ),
      React.createElement("button", {
        onClick: confirm,
        disabled: !repsValid,
        "aria-label": "Confirmar serie",
        style:{ width:"100%", padding:14, borderRadius:10, fontSize:11,
          letterSpacing:"0.3em", textTransform:"uppercase",
          background:color, color:"#000", border:"none",
          cursor: repsValid ? "pointer" : "not-allowed", opacity: repsValid ? 1 : 0.4,
          fontFamily:"inherit", fontWeight:600, transition:"opacity 0.15s" }
      }, "CONFIRMAR SERIE")
    )
  );
}

// ─── EXERCISE CARD ────────────────────────────────────────────────────
const ExerciseCard = React.memo(function ExerciseCard({ ex, color, weight, sessionLog, completedSets, onLogSet, onUndoSet, onEditWeight, deload }) {
  const sets = setsCountFor(ex, deload);
  const setsArr = Array.from({ length: sets }, (_, i) => i);
  const allDone = setsArr.every(i => completedSets[`${ex.id}-${i}`]);

  return React.createElement("div", {
    style:{
      background: allDone ? "#0c1a0c" : C.card,
      border:`1px solid ${allDone ? "#1e3a1e" : C.border}`,
      borderRadius:12, padding:"13px 14px", transition:"all 0.3s"
    }
  },
    React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 } },
      React.createElement("div", { style:{ flex:1, paddingRight:10 } },
        React.createElement("div", { style:{ display:"flex", alignItems:"center", gap:6, marginBottom:4 } },
          React.createElement("span", {
            style:{ fontSize:8, padding:"2px 6px", borderRadius:4, letterSpacing:"0.1em",
              background: ex.type==="comp" ? "#15153a" : "#1a1a1a",
              color: ex.type==="comp" ? "#6B8EFF" : C.muted }
          }, ex.type==="comp" ? "COMPUESTO" : "AISLADO"),
          ex.optional && React.createElement("span", {
            style:{ fontSize:8, padding:"2px 6px", borderRadius:4, letterSpacing:"0.1em",
              background:"#1a1505", color:"#caa23a" }
          }, "OPCIONAL"),
          allDone && React.createElement("span", { style:{ fontSize:11, color:"#4ade80" } }, "✓")
        ),
        React.createElement("p", { style:{ fontSize:12, color: allDone ? "#4ade80" : "#ccc", lineHeight:1.4 } }, ex.name)
      ),
      React.createElement("button", {
        onClick: () => onEditWeight(ex),
        "aria-label": `Editar peso de ${ex.name}, actual ${weight} ${ex.unit}`,
        style:{ textAlign:"right", flexShrink:0, background:"none", border:"none", padding:0,
          cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"flex-end", fontFamily:"inherit" }
      },
        React.createElement("div", { style:{ display:"flex", alignItems:"baseline", gap:4 } },
          React.createElement("p", { style:{ fontFamily:"'Bebas Neue',sans-serif", fontSize:22, color, lineHeight:1 } }, weight),
          React.createElement("span", { style:{ fontSize:9, color:"#444" } }, "✎")
        ),
        React.createElement("p", { style:{ fontSize:8, color:"#3a3a3a", letterSpacing:"0.1em", marginTop:1 } }, ex.unit)
      )
    ),
    React.createElement("div", { style:{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" } },
      React.createElement("span", { style:{ fontSize:9, color:"#3a3a3a", letterSpacing:"0.12em" } }, ex.reps+" rep"),
      ...setsArr.map(i => {
        const key = `${ex.id}-${i}`;
        const done = completedSets[key];
        const logData = sessionLog[key];
        return React.createElement("button", {
          key:i,
          onClick: () => done ? onUndoSet(ex.id, i) : onLogSet(ex, i),
          "aria-label": done
            ? `Deshacer serie ${i+1} de ${ex.name}, registrada con ${logData?.reps} repeticiones y ${logData?.weight} ${ex.unit}`
            : `Registrar serie ${i+1} de ${ex.name}`,
          style:{
            width:46, height:38, borderRadius:7, fontSize:9,
            border: done ? "none" : `1px solid #252525`,
            background: done ? color : "#181818",
            color: done ? "#000" : C.muted, cursor:"pointer",
            display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
            lineHeight:1.2, fontFamily:"inherit", transition:"all 0.15s"
          }
        },
          done
            ? [React.createElement("span", { key:"r", style:{ fontSize:11, fontWeight:600 } }, logData?.reps),
               React.createElement("span", { key:"w", style:{ fontSize:7 } }, logData?.weight)]
            : React.createElement("span", { key:"s", style:{ letterSpacing:"0.1em" } }, `S${i+1}`)
        );
      }),
      React.createElement("span", { style:{ fontSize:9, color:"#2a2a2a", marginLeft:"auto" } },
        ex.type==="comp" ? "3' desc" : "2' desc"
      )
    )
  );
}, (prev, next) => {
  if (prev.ex !== next.ex || prev.color !== next.color || prev.weight !== next.weight || prev.deload !== next.deload) return false;
  if (prev.onLogSet !== next.onLogSet || prev.onUndoSet !== next.onUndoSet || prev.onEditWeight !== next.onEditWeight) return false;
  const sets = setsCountFor(next.ex, next.deload);
  for (let i = 0; i < sets; i++) {
    const k = `${next.ex.id}-${i}`;
    if (!!prev.completedSets[k] !== !!next.completedSets[k]) return false;
    const a = prev.sessionLog[k], b = next.sessionLog[k];
    if ((a && a.reps) !== (b && b.reps)) return false;
    if ((a && a.weight) !== (b && b.weight)) return false;
  }
  return true;
});

// ─── MAIN APP ─────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("workout");
  const [weights, setWeights] = useState(loadWeights);
  const [history, setHistory] = useState(() => ls("ft_history", {}));
  const [weekNum, setWeekNum] = useState(() => ls("ft_week", 1));
  const [activeDay, setActiveDay] = useState(() => ls("ft_session", null)?.activeDay || "Upper A");
  const [sessionLog, setSessionLog] = useState(() => ls("ft_session", null)?.sessionLog || {});
  const [completedSets, setCompletedSets] = useState(() => ls("ft_session", null)?.completedSets || {});
  const [logging, setLogging] = useState(null);
  const [toast, setToast] = useState(null);

  const showToast = useCallback((msg, type="ok") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3500);
  }, []);

  const storageWarnedRef = useRef(false);
  const persistOrWarn = useCallback((ok, msg) => {
    if (!ok) {
      if (!storageWarnedRef.current) { storageWarnedRef.current = true; showToast(msg, "warn"); }
    } else {
      storageWarnedRef.current = false;
    }
  }, [showToast]);

  useEffect(() => {
    const ok = lss("ft_weights", weights) && lss("ft_routine_version", ROUTINE_VERSION);
    persistOrWarn(ok, "⚠️ No se pudo guardar el progreso (¿modo privado o memoria llena?)");
  }, [weights, persistOrWarn]);

  useEffect(() => {
    persistOrWarn(lss("ft_history", history), "⚠️ No se pudo guardar el historial");
  }, [history, persistOrWarn]);

  useEffect(() => { lss("ft_week", weekNum); }, [weekNum]);

  useEffect(() => {
    persistOrWarn(lss("ft_session", { activeDay, sessionLog, completedSets }), "⚠️ No se pudo guardar la sesión en curso");
  }, [activeDay, sessionLog, completedSets, persistOrWarn]);

  const weightsRef = useRef(weights);
  useEffect(() => { weightsRef.current = weights; }, [weights]);

  const isDeload = weekNum % 6 === 0;
  const dayColor = ROUTINE[activeDay].color;
  const exercises = ROUTINE[activeDay].exercises;

  const requiredExercises = exercises.filter(e => !e.optional);
  const allSets = requiredExercises.reduce((a,e) => a + setsCountFor(e, isDeload), 0);
  const doneSets = Object.keys(completedSets).filter(k => requiredExercises.some(e => k.startsWith(e.id+"-"))).length;
  const pct = allSets > 0 ? Math.round(doneSets/allSets*100) : 0;

  const handleLogSet = useCallback((ex, setIdx) => {
    setLogging({ ex, setIdx, exId: ex.id });
  }, []);

  const handleUndoSet = useCallback((exId, setIdx) => {
    const key = `${exId}-${setIdx}`;
    setCompletedSets(prev => { if (!(key in prev)) return prev; const n = { ...prev }; delete n[key]; return n; });
    setSessionLog(prev => { if (!(key in prev)) return prev; const n = { ...prev }; delete n[key]; return n; });
  }, []);

  const handleEditWeight = useCallback((ex) => {
    const current = weightsRef.current[ex.id];
    const input = window.prompt(`Nuevo peso — ${ex.name} (${ex.unit})`, current);
    if (input === null) return;
    const val = parseFloat(String(input).replace(",", "."));
    if (!Number.isFinite(val) || val < 0) { showToast("⚠️ Peso inválido", "warn"); return; }
    const rounded = Math.round(val * 100) / 100;
    setWeights(prev => ({ ...prev, [ex.id]: rounded }));
    showToast(`✎ Peso actualizado: ${rounded} ${ex.unit}`);
  }, [showToast]);

  const confirmLog = (weight, reps) => {
    if (!logging) return;
    const repsNum = Math.trunc(reps);
    if (!Number.isFinite(repsNum) || repsNum <= 0) { showToast("⚠️ Ingresá una cantidad de reps válida", "warn"); return; }

    const key = `${logging.exId}-${logging.setIdx}`;
    setSessionLog(prev => ({ ...prev, [key]: { weight, reps: repsNum } }));
    setCompletedSets(prev => ({ ...prev, [key]: true }));

    if (logging.setIdx === 0 && repsNum >= topRep(logging.ex.reps)) {
      const inc = incFor(logging.ex);
      if (inc > 0) {
        const newW = parseFloat((weight + inc).toFixed(2));
        setWeights(prev => ({ ...prev, [logging.exId]: newW }));
        showToast(`💪 ¡Sobrecarga! Nuevo peso: ${newW} ${logging.ex.unit}`, "progress");
      }
    }
    setLogging(null);
  };

  const finishWorkout = () => {
    const id = `${Date.now()}-${Math.random().toString(36).slice(2,8)}`;
    const entry = { date: new Date().toLocaleDateString("es-AR"), day: activeDay, log: {...sessionLog}, savedAt: Date.now() };
    setHistory(prev => ({ ...prev, [id]: entry }));
    setSessionLog({});
    setCompletedSets({});
    showToast("✅ Entrenamiento guardado");
  };

  const changeDay = d => { setActiveDay(d); setSessionLog({}); setCompletedSets({}); };

  const resetWeightsToPlan = () => {
    if (!confirm("¿Restablecer todos los pesos a los valores iniciales del plan? Se pierde el progreso de sobrecarga acumulado.")) return;
    setWeights(initWeights());
    showToast("↺ Pesos restablecidos al plan original");
  };

  const histEntries = useMemo(() =>
    Object.entries(history).sort((a,b) => (b[1].savedAt||0) - (a[1].savedAt||0)).slice(0,30),
    [history]
  );

  return React.createElement("div", {
    style:{ minHeight:"100vh", background:C.bg, position:"relative", overflow:"hidden" }
  },
    // BG grid
    React.createElement("div", { style:{
      position:"fixed", inset:0, zIndex:0,
      backgroundImage:`linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px)`,
      backgroundSize:"40px 40px", pointerEvents:"none"
    }}),
    // Accent glow
    React.createElement("div", { style:{
      position:"fixed", top:-120, right:-120, width:380, height:380,
      background:`radial-gradient(circle,${dayColor}1a 0%,transparent 70%)`,
      zIndex:0, transition:"background 0.5s", pointerEvents:"none"
    }}),

    // Scrollable content
    React.createElement("div", {
      style:{ position:"relative", zIndex:1, maxWidth:480, margin:"0 auto",
        padding:"env(safe-area-inset-top,16px) 16px 120px", minHeight:"100vh", overflowY:"auto" }
    },

      // ── HEADER ──
      React.createElement("div", { style:{ marginBottom:22, paddingTop:8 } },
        React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" } },
          React.createElement("div", null,
            React.createElement("p", { style:{ fontSize:9, letterSpacing:"0.35em", color:C.muted, textTransform:"uppercase", marginBottom:3 } },
              `SEMANA ${weekNum}${isDeload ? " · 🔄 DESCARGA" : ""}`
            ),
            React.createElement("h1", { style:{ fontFamily:"'Bebas Neue',sans-serif", fontSize:40, letterSpacing:"0.05em", color:"#fff", lineHeight:1 } },
              "PROGRESS",
              React.createElement("br"),
              React.createElement("span", { style:{ color:dayColor } }, "TRACKER")
            )
          ),
          React.createElement("div", { style:{ textAlign:"right" } },
            React.createElement("p", { style:{ fontSize:9, color:C.muted, letterSpacing:"0.2em" } }, "HOY"),
            React.createElement("p", { style:{ fontSize:12, color:"#777", marginBottom:6 } },
              new Date().toLocaleDateString("es-AR",{ weekday:"short", day:"numeric", month:"short" })
            ),
            React.createElement("div", { style:{ display:"flex", gap:5, justifyContent:"flex-end" } },
              React.createElement("button", {
                onClick: () => setWeekNum(w => Math.max(1, w-1)),
                "aria-label": "Semana anterior",
                style:{ fontSize:9, letterSpacing:"0.12em", color:C.muted, cursor:"pointer",
                  border:"1px solid #2a2a2a", borderRadius:4, padding:"3px 8px", background:"none",
                  fontFamily:"inherit" }
              }, "− SEMANA"),
              React.createElement("button", {
                onClick: () => setWeekNum(w => w+1),
                "aria-label": "Semana siguiente",
                style:{ fontSize:9, letterSpacing:"0.12em", color:C.muted, cursor:"pointer",
                  border:"1px solid #2a2a2a", borderRadius:4, padding:"3px 8px", background:"none",
                  fontFamily:"inherit" }
              }, "+ SEMANA")
            )
          )
        )
      ),

      // ── TABS ──
      React.createElement("div", { style:{ display:"flex", gap:4, marginBottom:18, background:"#0f0f0f", borderRadius:10, padding:4 } },
        ...[["workout","Sesión"],["history","Historial"],["overview","Overview"]].map(([v,l]) =>
          React.createElement("button", {
            key:v, onClick: () => setTab(v),
            "aria-label": `Ver pestaña ${l}`,
            style:{ flex:1, padding:"8px 0", fontSize:10, letterSpacing:"0.2em", textTransform:"uppercase",
              color: tab===v ? "#000" : C.muted,
              background: tab===v ? "#fff" : "none",
              borderRadius:7, border:"none", fontFamily:"inherit", cursor:"pointer", transition:"all 0.2s" }
          }, l)
        )
      ),

      // ══ WORKOUT TAB ══
      tab==="workout" && React.createElement("div", { className:"fade-in" },
        // Day selector
        React.createElement("div", { style:{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:7, marginBottom:18 } },
          ...DAYS.map(d => {
            const info = ROUTINE[d];
            const active = activeDay===d;
            return React.createElement("button", {
              key:d, onClick: () => changeDay(d),
              "aria-label": `Cambiar a ${d}, ${info.day}`,
              style:{ padding:"10px 4px", borderRadius:10, textAlign:"center",
                background: active ? info.color : "#0f0f0f",
                border: active ? "none" : "1px solid #181818",
                color: active ? "#000" : C.muted, cursor:"pointer", transition:"all 0.2s",
                fontFamily:"inherit" }
            },
              React.createElement("div", { style:{ fontSize:8, letterSpacing:"0.08em", marginBottom:2 } }, info.day.toUpperCase()),
              React.createElement("div", { style:{ fontFamily:"'Bebas Neue',sans-serif", fontSize:13, letterSpacing:"0.04em" } }, d)
            );
          })
        ),

        // Progress bar
        React.createElement("div", { style:{ marginBottom:18 } },
          React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", marginBottom:5 } },
            React.createElement("span", { style:{ fontSize:9, color:C.muted, letterSpacing:"0.2em" } }, "PROGRESO SESIÓN"),
            React.createElement("span", { style:{ fontSize:9, color:dayColor } }, `${doneSets}/${allSets} SERIES · ${pct}%`)
          ),
          React.createElement("div", { style:{ height:3, background:"#181818", borderRadius:2 } },
            React.createElement("div", { style:{ height:"100%", width:`${pct}%`, background:dayColor, borderRadius:2, transition:"width 0.5s ease" } })
          )
        ),

        // Exercises
        React.createElement("div", { style:{ display:"flex", flexDirection:"column", gap:9, marginBottom:16 } },
          ...exercises.map((ex, idx) =>
            React.createElement("div", { key:ex.id, className:"slide-up", style:{ animationDelay:`${idx*0.04}s` } },
              React.createElement(ExerciseCard, {
                ex, color:dayColor, weight:weights[ex.id],
                sessionLog, completedSets,
                onLogSet:handleLogSet, onUndoSet:handleUndoSet, onEditWeight:handleEditWeight,
                deload:isDeload
              })
            )
          )
        ),

        // Finish button
        doneSets > 0 && React.createElement("button", {
          onClick: finishWorkout,
          "aria-label": `Guardar entrenamiento, ${pct} por ciento completado`,
          style:{ width:"100%", padding:15, borderRadius:12, fontSize:11,
            letterSpacing:"0.3em", textTransform:"uppercase",
            background:dayColor, color:"#000", border:"none", cursor:"pointer",
            fontFamily:"inherit", fontWeight:600 }
        }, `GUARDAR ENTRENAMIENTO · ${pct}%`)
      ),

      // ══ HISTORY TAB ══
      tab==="history" && React.createElement("div", { className:"fade-in" },
        React.createElement("p", { style:{ fontSize:9, color:C.muted, letterSpacing:"0.25em", marginBottom:14 } },
          `ÚLTIMAS SESIONES — ${histEntries.length} REGISTROS`
        ),
        histEntries.length===0 && React.createElement("div", { style:{ textAlign:"center", padding:"60px 0", color:"#2a2a2a" } },
          React.createElement("p", { style:{ fontFamily:"'Bebas Neue',sans-serif", fontSize:36 } }, "SIN DATOS"),
          React.createElement("p", { style:{ fontSize:11, marginTop:8 } }, "Completá tu primera sesión")
        ),
        ...histEntries.map(([id, e]) => {
          const dc = ROUTINE[e.day]?.color || C.muted;
          const logs = Object.entries(e.log||{});
          return React.createElement("div", {
            key:id,
            style:{ background:C.card, border:`1px solid ${C.border}`, borderLeft:`3px solid ${dc}`,
              borderRadius:12, padding:14, marginBottom:9 }
          },
            React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", marginBottom:9 } },
              React.createElement("div", null,
                React.createElement("p", { style:{ fontFamily:"'Bebas Neue',sans-serif", fontSize:18, color:dc, lineHeight:1 } }, e.day),
                React.createElement("p", { style:{ fontSize:10, color:C.muted, marginTop:2 } }, e.date)
              ),
              React.createElement("div", { style:{ textAlign:"right" } },
                React.createElement("p", { style:{ fontFamily:"'Bebas Neue',sans-serif", fontSize:24, color:"#fff", lineHeight:1 } }, logs.length),
                React.createElement("p", { style:{ fontSize:8, color:"#3a3a3a" } }, "SERIES")
              )
            ),
            React.createElement("div", { style:{ display:"flex", flexWrap:"wrap", gap:4 } },
              ...logs.slice(0,8).map(([k,v]) =>
                React.createElement("span", { key:k, style:{ fontSize:9, padding:"3px 7px", borderRadius:5, background:"#181818", color:"#666" } },
                  `${v.reps}r×${v.weight}`)
              ),
              logs.length>8 && React.createElement("span", { key:"more", style:{ fontSize:9, color:"#333" } }, `+${logs.length-8}`)
            )
          );
        }),
        histEntries.length>0 && React.createElement("button", {
          onClick: () => { if(confirm("¿Borrar todo el historial?")) setHistory({}); },
          "aria-label": "Borrar todo el historial de entrenamientos",
          style:{ marginTop:10, width:"100%", padding:10, borderRadius:8,
            background:"none", border:"1px solid #2a1a1a", color:"#555",
            fontSize:9, letterSpacing:"0.2em", cursor:"pointer", fontFamily:"inherit" }
        }, "BORRAR HISTORIAL")
      ),

      // ══ OVERVIEW TAB ══
      tab==="overview" && React.createElement("div", { className:"fade-in" },
        ...DAYS.map(d => {
          const info = ROUTINE[d];
          return React.createElement("div", { key:d, style:{ marginBottom:18 } },
            React.createElement("div", { style:{ display:"flex", alignItems:"center", gap:7, marginBottom:8 } },
              React.createElement("div", { style:{ width:7, height:7, borderRadius:"50%", background:info.color } }),
              React.createElement("p", { style:{ fontFamily:"'Bebas Neue',sans-serif", fontSize:15, color:info.color, letterSpacing:"0.08em" } },
                `${d} — ${info.day}`)
            ),
            React.createElement("div", { style:{ display:"flex", flexDirection:"column", gap:4 } },
              ...info.exercises.map(ex => {
                const cur = weights[ex.id];
                const gained = parseFloat((cur - ex.iw).toFixed(1));
                return React.createElement("div", { key:ex.id,
                  style:{ display:"flex", justifyContent:"space-between", alignItems:"center",
                    background:C.card, border:`1px solid ${C.border}`, borderRadius:8, padding:"8px 12px" }
                },
                  React.createElement("p", { style:{ fontSize:11, color:"#777", flex:1 } }, ex.name),
                  React.createElement("div", { style:{ display:"flex", alignItems:"center", gap:8, flexShrink:0 } },
                    gained>0 && React.createElement("span", { style:{ fontSize:9, color:"#4ade80" } }, `+${gained}`),
                    React.createElement("span", { style:{ fontFamily:"'Bebas Neue',sans-serif", fontSize:20, color:info.color } }, cur),
                    React.createElement("span", { style:{ fontSize:8, color:"#2a2a2a", width:42 } }, ex.unit)
                  )
                );
              })
            )
          );
        }),

        React.createElement("div", { style:{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:14, marginTop:4 } },
          React.createElement("p", { style:{ fontSize:9, color:C.muted, letterSpacing:"0.25em", marginBottom:10 } }, "PARÁMETROS"),
          ...[
            ["Técnica","3s bajar · 1s subir"],
            ["RIR","1-2 primeras · 0-1 última"],
            ["Compuestos","3 min descanso"],
            ["Aislados","2 min descanso"],
            ["Progresión","+2.5kg / +1 disco / +5 máq al llegar tope rango S1, RIR 0"],
            ["Descarga","Cada 6 semanas (2 series)"],
            ["Semana",`#${weekNum}${isDeload?" ← DESCARGA":""}`],
          ].map(([k,v]) =>
            React.createElement("div", { key:k,
              style:{ display:"flex", justifyContent:"space-between", paddingBottom:7,
                borderBottom:`1px solid #141414`, marginBottom:7 }
            },
              React.createElement("span", { style:{ fontSize:10, color:"#3a3a3a" } }, k),
              React.createElement("span", { style:{ fontSize:10, color: isDeload&&k==="Semana" ? "#F59E0B" : "#777" } }, v)
            )
          )
        ),

        React.createElement("button", {
          onClick: resetWeightsToPlan,
          "aria-label": "Restablecer todos los pesos a los valores iniciales del plan",
          style:{ marginTop:10, width:"100%", padding:10, borderRadius:8,
            background:"none", border:"1px solid #2a1a1a", color:"#555",
            fontSize:9, letterSpacing:"0.2em", cursor:"pointer", fontFamily:"inherit" }
        }, "↺ RESTABLECER PESOS AL PLAN")
      )
    ),

    // ── BOTTOM NAV BAR ──
    React.createElement("div", { style:{
      position:"fixed", bottom:0, left:0, right:0, zIndex:50,
      background:"rgba(10,10,15,0.95)", backdropFilter:"blur(16px)",
      borderTop:`1px solid ${C.border}`,
      paddingBottom:"env(safe-area-inset-bottom,8px)",
      display:"flex", justifyContent:"center"
    }},
      React.createElement("div", { style:{ display:"flex", width:"100%", maxWidth:480 } },
        ...[["workout","💪","Sesión"],["history","📋","Historial"],["overview","📊","Overview"]].map(([v,icon,l]) =>
          React.createElement("button", {
            key:v, onClick: () => setTab(v),
            "aria-label": `Ir a ${l}`,
            style:{ flex:1, padding:"10px 0 8px", border:"none", background:"none",
              cursor:"pointer", fontFamily:"inherit", display:"flex", flexDirection:"column",
              alignItems:"center", gap:3 }
          },
            React.createElement("span", { style:{ fontSize:18 } }, icon),
            React.createElement("span", { style:{ fontSize:9, letterSpacing:"0.15em", color: tab===v ? dayColor : C.muted } }, l)
          )
        )
      )
    ),

    // ── LOG MODAL ──
    logging && React.createElement(LogModal, {
      ex: logging.ex, setIdx: logging.setIdx,
      color: dayColor, currentWeight: weights[logging.exId],
      onConfirm: confirmLog, onClose: () => setLogging(null)
    }),

    // ── TOAST ──
    toast && React.createElement("div", {
      className:"toast-anim",
      role:"status",
      "aria-live":"polite",
      style:{
        position:"fixed", bottom:90, right:14, zIndex:300,
        background: toast.type==="progress" ? "#0d1f0d" : toast.type==="warn" ? "#1f1408" : "#12121f",
        border:`1px solid ${toast.type==="progress" ? "#4ade80" : toast.type==="warn" ? "#f59e0b" : "#6B8EFF"}`,
        borderRadius:10, padding:"11px 14px", maxWidth:260,
        fontSize:11, color: toast.type==="progress" ? "#4ade80" : toast.type==="warn" ? "#f59e0b" : "#aaa", lineHeight:1.4
      }
    }, toast.msg)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
